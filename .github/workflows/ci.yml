name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npx prisma generate

      - run: npm run build
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/opervia"
          AUTH_SECRET: "ci-build-secret-minimum-32-chars-long"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
